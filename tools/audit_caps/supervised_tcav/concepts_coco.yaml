concepts:
  - id: edge_segment
    name: edge segment
    level: L1
    description: A short local boundary segment.
    children: []

  - id: corner_junction
    name: corner junction
    level: L1
    description: A local corner-like meeting of boundaries.
    children: []

  - id: curved_contour
    name: curved contour
    level: L1
    description: A locally curved boundary segment.
    children: []

  - id: closed_boundary
    name: closed boundary
    level: L1
    description: A boundary enclosing a local region.
    children: []

  - id: circular_outline
    name: circular outline
    level: L1
    description: A roughly circular boundary shape.
    children: []

  - id: rectangular_patch
    name: rectangular patch
    level: L1
    description: A local rectangular planar region.
    children: []

  - id: elongated_line
    name: elongated line
    level: L1
    description: A long thin local line structure.
    children: []

  - id: blob_region
    name: blob region
    level: L1
    description: A compact local filled region.
    children: []

  - id: parallel_stripe
    name: parallel stripe
    level: L1
    description: Multiple nearby parallel elongated bands.
    children: []

  - id: repetitive_texture
    name: repetitive texture
    level: L1
    description: Repeating local visual pattern.
    children: []

  - id: wheel
    name: wheel
    level: L2
    description: A round rolling part attached to a vehicle body.
    children:
      - circular_outline
      - closed_boundary
      - edge_segment

  - id: window_pane
    name: window pane
    level: L2
    description: A flat framed transparent opening on an object body.
    children:
      - rectangular_patch
      - edge_segment
      - corner_junction

  - id: handle_like_part
    name: handle-like part
    level: L2
    description: A short graspable projecting part.
    children:
