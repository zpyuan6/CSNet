meta:
  dataset: coco
  version: v1
  description: Minimal hierarchical concept definitions for supervised audit on COCO.

levels:
  - id: L1
    name: primitive
    description: Low-level visual primitives.
  - id: L2
    name: local_structure
    description: Local parts or localized visual structures.
  - id: L3
    name: semantic_pattern
    description: Mid/high-level semantic patterns.
  - id: L4
    name: class_concept
    description: Final class concepts.

level_concepts:
