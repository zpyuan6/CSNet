concepts:
  - {id: round_contour, name: round contour, level: L1, description: A round or nearly round visible outline., children: []}
  - {id: rectangular_panel, name: rectangular panel, level: L1, description: A roughly rectangular local face or panel., children: []}
  - {id: elongated_contour, name: elongated contour, level: L1, description: A long narrow visible contour., children: []}
  - {id: curved_edge, name: curved edge, level: L1, description: A smooth curved boundary fragment., children: []}
  - {id: compact_blob, name: compact blob, level: L1, description: A compact localized visual region., children: []}
  - {id: repeated_texture, name: repeated texture, level: L1, description: A repeated local pattern or texture., children: []}
  - {id: stripe_pattern, name: stripe pattern, level: L1, description: A repeated stripe-like local pattern., children: []}

  - {id: wheel, name: wheel, level: L2, description: A circular vehicle wheel or tire., children: [round_contour, curved_edge]}
  - {id: vehicle_window, name: vehicle window, level: L2, description: A rectangular window on a vehicle body., children: [rectangular_panel, curved_edge]}
  - {id: vehicle_body, name: vehicle body, level: L2, description: A rigid body shell of a transport object., children: [rectangular_panel, elongated_contour]}
  - {id: signal_light, name: signal light, level: L2, description: A stacked or grouped light signal region., children: [round_contour, rectangular_panel]}
  - {id: sign_panel, name: sign panel, level: L2, description: A flat sign-like panel region., children: [rectangular_panel, round_contour]}
  - {id: handle, name: handle, level: L2, description: A graspable handle-like part., children: [curved_edge, elongated_contour]}
  - {id: human_head, name: human head, level: L2, description: A visible human head region., children: [compact_blob, curved_edge]}
  - {id: human_limb, name: human limb, level: L2, description: A visible arm or leg-like human body segment., children: [elongated_contour, curved_edge]}
  - {id: animal_head, name: animal head, level: L2, description: A visible animal head region., children: [compact_blob, curved_edge]}
  - {id: animal_limb, name: animal limb, level: L2, description: A visible animal leg or appendage., children: [elongated_contour, curved_edge]}
  - {id: wing, name: wing, level: L2, description: A wing-like laterally extended region., children: [curved_edge, elongated_contour]}
  - {id: container_mouth, name: container mouth, level: L2, description: An opening or rim of a container., children: [round_contour, curved_edge]}
  - {id: screen_panel, name: screen panel, level: L2, description: A flat electronic display panel., children: [rectangular_panel]}
  - {id: keyboard_buttons, name: keyboard buttons, level: L2, description: A repeated button or key region., children: [repeated_texture, rectangular_panel]}
  - {id: seat_surface, name: seat surface, level: L2, description: A sitting or resting support surface., children: [rectangular_panel, curved_edge]}
  - {id: table_top, name: table top, level: L2, description: A broad flat top support surface., children: [rectangular_panel]}
  - {id: food_body, name: food body, level: L2, description: A compact visible food item body., children: [compact_blob, round_contour]}
  - {id: utensil_tip, name: utensil tip, level: L2, description: A functional eating or cutting tool end., children: [elongated_contour, curved_edge]}
  - {id: plant_leaf_cluster, name: plant leaf cluster, level: L2, description: A clustered leaf-like plant region., children: [curved_edge, repeated_texture]}
  - {id: rigid_box_body, name: rigid box body, level: L2, description: A rigid box-like object body., children: [rectangular_panel]}
  - {id: soft_body, name: soft body, level: L2, description: A soft rounded or padded object body., children: [compact_blob, curved_edge]}
  - {id: small_handheld_body, name: small handheld body, level: L2, description: A compact object body held or operated by hand., children: [rectangular_panel, elongated_contour]}

  - {id: human_body, name: human body, level: L3, description: A human body configuration with head and limbs., children: [human_head, human_limb]}
  - {id: wheeled_vehicle, name: wheeled vehicle, level: L3, description: A vehicle body supported by wheels., children: [vehicle_body, wheel, vehicle_window]}
  - {id: two_wheel_vehicle, name: two-wheel vehicle, level: L3, description: A narrow rideable vehicle with wheels and handle structure., children: [wheel, handle, vehicle_body]}
  - {id: large_vehicle, name: large vehicle, level: L3, description: A large transport body with vehicle windows and rigid shell., children: [vehicle_body, vehicle_window, wheel]}
  - {id: flying_or_floating_vehicle, name: flying or floating vehicle, level: L3, description: A rigid transport body with wing or hull-like structure., children: [vehicle_body, wing]}
  - {id: animal_body, name: animal body, level: L3, description: A non-human animal body configuration., children: [animal_head, animal_limb, soft_body]}
  - {id: bird_body, name: bird body, level: L3, description: A bird-like body configuration with wing structure., children: [animal_head, wing, soft_body]}
  - {id: carried_bag, name: carried bag, level: L3, description: A portable bag-like object with body and handle., children: [rigid_box_body, handle]}
  - {id: sports_equipment, name: sports equipment, level: L3, description: A sports object, board, racket, bat, glove, or ball structure., children: [rigid_box_body, handle, round_contour]}
  - {id: drink_container, name: drink container, level: L3, description: A bottle, glass, cup, or bowl-like container structure., children: [container_mouth, rigid_box_body]}
  - {id: tableware, name: tableware, level: L3, description: An eating utensil or small tableware object., children: [utensil_tip, elongated_contour]}
  - {id: food_object, name: food object, level: L3, description: A compact edible object body., children: [food_body]}
  - {id: seating_furniture, name: seating furniture, level: L3, description: A seat or padded furniture structure., children: [seat_surface, soft_body]}
  - {id: table_furniture, name: table furniture, level: L3, description: A table-like furniture structure with a flat support top., children: [table_top]}
  - {id: plant_container, name: plant container, level: L3, description: A potted plant structure with leaves and rigid container., children: [plant_leaf_cluster, rigid_box_body]}
  - {id: electronic_device, name: electronic device, level: L3, description: An object dominated by a screen, buttons, or handheld electronics body., children: [screen_panel, keyboard_buttons, small_handheld_body]}
  - {id: kitchen_appliance, name: kitchen appliance, level: L3, description: A rigid kitchen appliance with box-like body or door panel., children: [rigid_box_body, handle]}
  - {id: bathroom_fixture, name: bathroom fixture, level: L3, description: A rigid bathroom fixture or sink-like object., children: [rigid_box_body, container_mouth]}
  - {id: book_like_object, name: book-like object, level: L3, description: A flat reading object with rectangular body., children: [rectangular_panel]}
  - {id: decorative_object, name: decorative object, level: L3, description: A clock, vase, or plush decorative object structure., children: [round_contour, container_mouth, soft_body]}
  - {id: grooming_tool, name: grooming tool, level: L3, description: A handheld grooming tool structure., children: [small_handheld_body, handle]}

