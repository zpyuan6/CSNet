# Capsule OVD mixed-data template aligned with YOLO-World/YOLOE-style training.
# Fill in local dataset YAML paths and grounding annotations before use.

train:
  yolo_data:
    - Objects365.yaml
  grounding_data:
    - img_path: flickr30k/images
      json_file: flickr30k/final_flickr_separateGT_train.json
    - img_path: GQA/images
      json_file: GQA/final_mixed_train_no_coco.json

val:
  yolo_data:
    - lvis.yaml
